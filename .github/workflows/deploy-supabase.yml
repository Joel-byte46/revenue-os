# .github/workflows/deploy-supabase.yml
name: Deploy Revenue OS to Supabase Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Database + Edge Functions

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Supabase CLI (stable official version)
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # 3. Debug: verify functions exist (important for silent failures)
      - name: List Supabase functions
        run: ls -R supabase/functions

      # 4. Link Supabase project (non-interactive CI mode)
      - name: Link to Supabase Project
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
          SUPABASE_NO_UPDATE_NOTIFIER: true

      # 5. Push database migrations
      - name: Push Database Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      # 6. Deploy ALL Edge Functions (fix principal)
      - name: Deploy Edge Functions
        run: |
          supabase functions deploy --all \
            --no-verify-jwt \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      # 7. Success notification
      - name: Notify Success
        if: success()
        run: echo "🚀 Revenue OS deployed successfully to Supabase Cloud"

      # 8. Failure notification
      - name: Notify Failure
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."
