name: Deploy Revenue OS to Supabase Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Database + Edge Functions

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Supabase CLI
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # 3. Prepare scripts
      - name: Prepare scripts
        run: |
          chmod +x fix-uuid.sh
          chmod +x .github/scripts/deploy-functions.sh

      # 4. Fix SQL compatibility BEFORE DB push
      - name: Fix UUID strategy
        run: bash fix-uuid.sh

      # 5. Link Supabase project
      - name: Link to Supabase Project
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
          SUPABASE_NO_UPDATE_NOTIFIER: true

      # 6. Push database migrations
      - name: Push Database Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      # 7. Debug functions structure
      - name: List Supabase functions
        run: ls -R supabase/functions

      # 8. Deploy Edge Functions (FIXED)
      - name: Deploy Edge Functions
        run: bash .github/scripts/deploy-functions.sh
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      # 9. Success notification
      - name: Notify Success
        if: success()
        run: echo "🚀 Revenue OS deployed successfully to Supabase Cloud"

      # 10. Failure notification
      - name: Notify Failure
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."
