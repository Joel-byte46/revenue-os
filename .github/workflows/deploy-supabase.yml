# .github/workflows/deploy-supabase.yml
name: Deploy Revenue OS to Supabase Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Database + Edge Functions

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Supabase CLI (IMPORTANT: doit être en premier)
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # 3. Make scripts executable
      - name: Prepare scripts
        run: chmod +x fix-uuid.sh

      # 4. Fix SQL compatibility BEFORE DB push
      - name: Fix UUID strategy
        run: bash fix-uuid.sh

      # 5. Link Supabase project
      - name: Link to Supabase Project
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
          SUPABASE_NO_UPDATE_NOTIFIER: true

      # 6. Push database migrations (ONLY HERE)
      - name: Push Database Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      # 7. Debug functions structure
      - name: List Supabase functions
        run: ls -R supabase/functions

      # 8. Deploy Edge Functions
      - name: Deploy Edge Functions
        run: |
          supabase functions deploy --all \
            --no-verify-jwt \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      # 9. Success notification
      - name: Notify Success
        if: success()
        run: echo "🚀 Revenue OS deployed successfully to Supabase Cloud"

      # 10. Failure notification
      - name: Notify Failure
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."
